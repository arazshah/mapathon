services:
  backend:
    build: ./backend
    restart: always
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    volumes:
      - feedback-db:/app/data
    networks:
      - mapathon

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - mapathon

volumes:
  feedback-db:

networks:
  mapathon:
    driver: bridge
